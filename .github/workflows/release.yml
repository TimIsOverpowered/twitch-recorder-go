name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - run: go test -v ./...

  build:
    needs: test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - os: windows
            arch: amd64
          - os: windows
            arch: arm64
          - os: darwin
            arch: amd64
          - os: darwin
            arch: arm64
          - os: linux
            arch: amd64
          - os: linux
            arch: arm64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Build binary
        shell: bash
        run: |
          EXT=""
          [ "${{ matrix.os }}" == "windows" ] && EXT=".exe"
          BINARY="twitch-recorder-go-${{ matrix.os }}-${{ matrix.arch }}${EXT}"
          GOOS=${{ matrix.os }} GOARCH=${{ matrix.arch }} go build -o "${BINARY}" ./cmd/twitch-recorder
          sha256sum "${BINARY}" > "${BINARY}.sha256"

      - uses: actions/upload-artifact@v4
        with:
          name: twitch-recorder-go-${{ matrix.os }}-${{ matrix.arch }}
          path: twitch-recorder-go-${{ matrix.os }}-${{ matrix.arch }}*

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v4

      - name: Combine checksums
        run: find . -name "*.sha256" -exec cat {} \; > CHECKSUMS.txt

      - name: Generate changelog
        run: |
          git log --oneline $(git describe --tags --abbrev=0 HEAD^)..HEAD > RELEASE_NOTES.md || echo "Initial release" > RELEASE_NOTES.md

      - uses: softprops/action-gh-release@v2
        with:
          draft: true
          body_path: RELEASE_NOTES
